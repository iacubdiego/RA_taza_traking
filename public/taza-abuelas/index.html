<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Taza – Pañuelo Orbitante</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script src="./assets/js/ar-components.js"></script>
  <link rel="stylesheet" href="./assets/styles.css">
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Iniciando cámara…</p>
  </div>

  <div id="start-overlay">
    <button id="start-btn">Iniciar experiencia</button>
  </div>

  <div id="hint">Apuntá la cámara al marker de la taza</div>
  
  <button id="audio-btn">🔊</button>

  <button id="cal-btn">⚙ Calibrar</button>

  <div id="cal-panel">
    <button class="close">✕</button>
    <strong>Calibración en vivo</strong>

    <label>Radio órbita: <span class="vv" id="v-r">0.7</span>
      <input type="range" id="in-r" min="0.2" max="2.0" step="0.05" value="0.7">
    </label>

    <label>Profundidad centro (Z): <span class="vv" id="v-z">-0.65</span>
      <input type="range" id="in-z" min="-2.0" max="0.5" step="0.05" value="-0.65">
    </label>

    <label>Altura centro (Y): <span class="vv" id="v-h">0</span>
      <input type="range" id="in-h" min="-1.0" max="1.0" step="0.05" value="0">
    </label>

    <label>Tamaño pañuelo: <span class="vv" id="v-s">0.35</span>
      <input type="range" id="in-s" min="0.1" max="1.0" step="0.05" value="0.35">
    </label>

    <label>Velocidad (°/s): <span class="vv" id="v-sp">40</span>
      <input type="range" id="in-sp" min="10" max="120" step="5" value="40">
    </label>

    <label>
      <input type="checkbox" id="chk-debug"> Mostrar forma taza (debug)
    </label>

    <hr class="cal-divider">
    <strong style="font-size:.7rem">Base</strong>

    <label>Radio base: <span class="vv" id="v-br">1.0</span>
      <input type="range" id="in-br" min="0.3" max="2.5" step="0.05" value="1.0">
    </label>

    <label>Altura base (Y): <span class="vv" id="v-by">-0.6</span>
      <input type="range" id="in-by" min="-1.5" max="0.5" step="0.05" value="-0.6">
    </label>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets/taza-marker.mind; maxTrack: 1; filterMinCF: 0.001; filterBeta: 10; warmupTolerance: 5; missTolerance: 5;"
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <img id="panuelo-tex" src="./assets/panuelo.png" crossorigin="anonymous" />
      <img id="base-tex" src="./assets/base.png" crossorigin="anonymous" />
      <audio id="audio-detect" src="./assets/audio.mp3" preload="auto"></audio>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity id="orbit-center" position="0 0 -0.65">
        
        <a-entity id="orbit-pivot" orbit-animation="speed: 40">
          <a-plane
            id="panuelo"
            position="0.7 0 0" width="0.35" height="0.35"
            material="src: #panuelo-tex; transparent: true; alphaTest: 0.5; side: double;"
            billboard
          ></a-plane>
        </a-entity>

        <a-cylinder id="cup-occluder" radius="0.55" height="1.2" position="0 0 0" occluder></a-cylinder>

        <a-cylinder
          id="debug-cup" radius="0.55" height="1.2" position="0 0 0"
          material="color: #ff0066; opacity: 0.25; transparent: true; side: double"
          visible="false"
        ></a-cylinder>

        <a-circle
          id="ar-base" radius="1.0" rotation="-90 0 0" position="0 -0.6 0"
          material="src: #base-tex; transparent: true; alphaTest: 0.1; side: double;"
        ></a-circle>

      </a-entity>
    </a-entity>
  </a-scene>

  <script src="./assets/app.js"></script>
</body>
</html>
