<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Taza – Pañuelo Orbitante</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; }

    #loading-overlay {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #fff;
      font-family: system-ui, sans-serif;
      transition: opacity .4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 1.2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #hint {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: #fff;
      padding: .6rem 1.2rem; border-radius: 2rem;
      font: 500 .85rem/1.3 system-ui, sans-serif;
      z-index: 10; transition: opacity .3s;
      pointer-events: none;
    }
    #hint.hidden { opacity: 0; }

    /* ── Panel de calibración ── */
    #cal-btn {
      position: fixed; top: .5rem; right: .5rem; z-index: 21;
      background: rgba(0,0,0,.75); color: #fff; border: none;
      padding: .5rem .8rem; border-radius: .4rem;
      font-size: .85rem; cursor: pointer;
    }
    #cal-panel {
      position: fixed; top: .5rem; right: .5rem; z-index: 20;
      background: rgba(0,0,0,.85); color: #fff;
      padding: .8rem; border-radius: .6rem;
      font: 400 .72rem/1.5 system-ui, sans-serif;
      width: 230px; display: none;
    }
    #cal-panel label { display: block; margin-top: .5rem; }
    #cal-panel input[type=range] { width: 100%; margin-top: .15rem; }
    .vv { color: #4f4; font-family: monospace; font-size: .8rem; }
    #cal-panel .close {
      float: right; background: none; border: none;
      color: #fff; cursor: pointer; font-size: 1rem;
    }
  </style>

  <script>
    /* ─── orbit-animation: rota el pivot en Y ─────────── */
    AFRAME.registerComponent('orbit-animation', {
      schema: {
        speed:  { type: 'number', default: 40 },
        paused: { type: 'boolean', default: false }
      },
      init() { this._angle = 0; },
      tick(_, delta) {
        if (this.data.paused) return;
        this._angle = (this._angle + (delta / 1000) * this.data.speed) % 360;
        this.el.object3D.rotation.y = THREE.MathUtils.degToRad(this._angle);
      }
    });

    /* ─── billboard: el plano 2D siempre mira a cámara ── */
    AFRAME.registerComponent('billboard', {
      tick() {
        const cam = this.el.sceneEl.camera;
        if (!cam) return;
        this.el.object3D.lookAt(cam.getWorldPosition(new THREE.Vector3()));
      }
    });

    /* ─── occluder: invisible pero bloquea el depth ───── */
    AFRAME.registerComponent('occluder', {
      init() {
        const apply = () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;
          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material = new THREE.MeshBasicMaterial({ colorWrite: false });
              node.renderOrder = -1;
            }
          });
        };
        setTimeout(apply, 0);
        this.el.addEventListener('object3dset', apply);
      }
    });
  </script>
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Iniciando cámara…</p>
  </div>

  <!-- Botón de inicio: desbloquea audio en iOS -->
  <div id="start-overlay" style="
    position:fixed; inset:0; z-index:998;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.6);
  ">
    <button id="start-btn" style="
      background:#fff; color:#1a1a1a; border:none;
      padding:1rem 2.5rem; border-radius:2rem;
      font:600 1.1rem/1 system-ui,sans-serif;
      cursor:pointer;
    ">Iniciar experiencia</button>
  </div>

  <div id="hint">Apuntá la cámara al marker de la taza</div>

  <!-- ── Botón + panel de calibración ─────────────────── -->
  <button id="cal-btn" onclick="
    document.getElementById('cal-panel').style.display='block';
    this.style.display='none';
  ">⚙ Calibrar</button>

  <div id="cal-panel">
    <button class="close" onclick="
      this.parentElement.style.display='none';
      document.getElementById('cal-btn').style.display='block';
    ">✕</button>
    <strong>Calibración en vivo</strong>

    <label>Radio órbita: <span class="vv" id="v-r">0.7</span>
      <input type="range" min="0.2" max="2.0" step="0.05" value="0.7" oninput="
        document.getElementById('v-r').textContent=this.value;
        document.getElementById('panuelo').setAttribute('position', this.value+' 0 0');
      ">
    </label>

    <label>Profundidad centro (Z): <span class="vv" id="v-z">-0.65</span>
      <input type="range" min="-2.0" max="0.5" step="0.05" value="-0.65" oninput="
        document.getElementById('v-z').textContent=this.value;
        var p=document.getElementById('orbit-center');
        var c=p.getAttribute('position');
        p.setAttribute('position',{x:c.x, y:c.y, z:parseFloat(this.value)});
      ">
    </label>

    <label>Altura centro (Y): <span class="vv" id="v-h">0</span>
      <input type="range" min="-1.0" max="1.0" step="0.05" value="0" oninput="
        document.getElementById('v-h').textContent=this.value;
        var p=document.getElementById('orbit-center');
        var c=p.getAttribute('position');
        p.setAttribute('position',{x:c.x, y:parseFloat(this.value), z:c.z});
      ">
    </label>

    <label>Tamaño pañuelo: <span class="vv" id="v-s">0.35</span>
      <input type="range" min="0.1" max="1.0" step="0.05" value="0.35" oninput="
        document.getElementById('v-s').textContent=this.value;
        document.getElementById('panuelo').setAttribute('width', this.value);
        document.getElementById('panuelo').setAttribute('height', this.value);
      ">
    </label>

    <label>Velocidad (°/s): <span class="vv" id="v-sp">40</span>
      <input type="range" min="10" max="120" step="5" value="40" oninput="
        document.getElementById('v-sp').textContent=this.value;
        document.getElementById('orbit-pivot').setAttribute('orbit-animation','speed',this.value);
      ">
    </label>

    <label>
      <input type="checkbox" id="chk-debug" onchange="
        document.getElementById('debug-cup').setAttribute('visible', this.checked);
      "> Mostrar forma taza (debug)
    </label>

    <hr style="border:none;border-top:1px solid #555;margin-top:.6rem">
    <strong style="font-size:.7rem">Base</strong>

    <label>Radio base: <span class="vv" id="v-br">1.0</span>
      <input type="range" min="0.3" max="2.5" step="0.05" value="1.0" oninput="
        document.getElementById('v-br').textContent=this.value;
        document.getElementById('ar-base').setAttribute('radius', this.value);
      ">
    </label>

    <label>Altura base (Y): <span class="vv" id="v-by">-0.6</span>
      <input type="range" min="-1.5" max="0.5" step="0.05" value="-0.6" oninput="
        document.getElementById('v-by').textContent=this.value;
        var b=document.getElementById('ar-base');
        b.setAttribute('position',{x:0, y:parseFloat(this.value), z:0});
      ">
    </label>
  </div>

  <!-- ═════════════════════════════════════════════════════
       ESCENA AR
       ═════════════════════════════════════════════════════ -->
  <a-scene
    mindar-image="
      imageTargetSrc: ./targets/taza-marker.mind;
      maxTrack: 1;
      filterMinCF: 0.001;
      filterBeta: 10;
      warmupTolerance: 5;
      missTolerance: 5;
    "
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <img id="panuelo-tex" src="./assets/panuelo.png" crossorigin="anonymous" />
      <img id="base-tex" src="./assets/base.png" crossorigin="anonymous" />
      <audio id="audio-detect" src="./assets/audio.mp3" preload="auto"></audio>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ── TARGET: marker en el costado de la taza ─────── -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!--
        COORDENADAS DEL MARKER (en el costado de la taza):

           Y (↑ vertical)
           |
           |   Z (→ hacia la cámara, sale del marker)
           |  /
           | /
           +———— X (horizontal sobre la superficie)

        El eje central de la taza está DETRÁS del marker,
        desplazado en -Z por el radio de la taza.

        Tu taza: marker ≈ 6cm ancho, taza ≈ 8cm diámetro
        → radio = 4cm → en unidades marker = 4/6 ≈ 0.65
      -->

      <!-- Centro de órbita = eje central de la taza -->
      <a-entity id="orbit-center" position="0 0 -0.65">

        <!-- Pivot que rota en Y → órbita horizontal -->
        <a-entity id="orbit-pivot" orbit-animation="speed: 40">

          <!-- Pañuelo desplazado en X por el radio -->
          <a-plane
            id="panuelo"
            position="0.7 0 0"
            width="0.35"
            height="0.35"
            material="
              src: #panuelo-tex;
              transparent: true;
              alphaTest: 0.5;
              side: double;
            "
            billboard
          ></a-plane>
        </a-entity>

        <!--
          OCCLUDER: cilindro invisible con forma de taza.
          Bloquea el pañuelo cuando pasa por detrás.
          radius y height en unidades marker — ajustar con panel debug.
        -->
        <a-cylinder
          id="cup-occluder"
          radius="0.55"
          height="1.2"
          position="0 0 0"
          occluder
        ></a-cylinder>

        <!-- DEBUG: misma forma que el occluder pero visible (rosa) -->
        <a-cylinder
          id="debug-cup"
          radius="0.55"
          height="1.2"
          position="0 0 0"
          material="color: #ff0066; opacity: 0.25; transparent: true; side: double"
          visible="false"
        ></a-cylinder>

        <!--
          BASE: imagen circular debajo de la taza.
          Rotada -90° en X para quedar horizontal (plana sobre la mesa).
          position.y = mitad negativa del height del occluder (base de la taza).
          El radius de la base es un poco mayor que el radio de órbita
          para que se vea como plataforma.
        -->
        <a-circle
          id="ar-base"
          radius="1.0"
          rotation="-90 0 0"
          position="0 -0.6 0"
          material="
            src: #base-tex;
            transparent: true;
            alphaTest: 0.1;
            side: double;
          "
        ></a-circle>

      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const scene        = document.querySelector('a-scene');
    const overlay      = document.getElementById('loading-overlay');
    const startOverlay = document.getElementById('start-overlay');
    const startBtn     = document.getElementById('start-btn');
    const hint         = document.getElementById('hint');
    const target       = document.querySelector('[mindar-image-target]');

    let audioUnlocked = false;
    let audioPlayed   = false;
    const audio       = document.getElementById('audio-detect');

    // 1. Cuando la escena AR está lista, mostrar botón de inicio
    scene.addEventListener('arReady', () => {
      overlay.classList.add('hidden');
      startOverlay.style.display = 'flex';
    });

    // 2. El tap desbloquea audio en iOS y oculta el overlay
    startBtn.addEventListener('click', () => {
      // iOS necesita un play() dentro de un gesto del usuario
      audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audioUnlocked = true;
      }).catch(() => {
        // Si falla, al menos lo intentamos
        audioUnlocked = true;
      });
      startOverlay.style.display = 'none';
    });

    // 3. Al detectar el marker: ocultar hint + reproducir audio una vez
    target.addEventListener('targetFound', () => {
      hint.classList.add('hidden');

      if (audioUnlocked && !audioPlayed) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
        audioPlayed = true;
      }
    });

    target.addEventListener('targetLost', () => {
      hint.classList.remove('hidden');
    });
  </script>
</body>
</html>
